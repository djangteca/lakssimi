<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page non trouvée | Tarik Lakssimi</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            color: var(--color-white);
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-family: var(--font-serif);
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 400;
            color: var(--color-accent);
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-family: var(--font-serif);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 400;
            margin-bottom: 1rem;
        }
        .error-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            max-width: 400px;
        }
        .error-link {
            display: inline-block;
            padding: 1rem 2rem;
            background-color: var(--color-accent);
            color: var(--color-white);
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .error-link:hover {
            background-color: var(--color-accent-light);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <main class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Page non trouvée</h1>
        <p class="error-text">La page que vous recherchez n'existe pas ou a été déplacée.</p>
        <a href="/" class="error-link">Retour à l'accueil</a>
    </main>
</body>
</html>
